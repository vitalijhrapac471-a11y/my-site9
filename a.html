<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Сторінка а</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #efecc7;
    }

    .card {
      width: 700px;
      height: 320px;
      background: #eca07a;
      margin: 80px auto;
      position: relative;
      border: 1px solid #b86d4a;
    }

    .title {
      text-align: center;
      font-size: 32px;
      color: #2f5aa8;
      padding-top: 20px;
    }

    .photo-left, .photo-right {
      width: 180px;
      height: 110px;
      background: #1296d4;
      color: white;
      text-align: center;
      line-height: 110px;
      font-weight: bold;
      position: absolute;
      top: 100px;
    }

    .photo-left {
      left: 15px;
    }

    .photo-right {
      right: 15px;
    }

    .text {
      width: 280px;
      font-size: 12px;
      color: #c85f2f;
      position: absolute;
      top: 100px;
      left: 210px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Lorem Ipsum</div>
    <div class="photo-left">ФОТОГРАФІЯ</div>
    <div class="photo-right">ФОТОГРАФІЯ</div>
    <div class="text">
      Lorem ipsum dolor sit amet, consectetur adipisicing elit. 
      Quia, atque. Adipisci doloribus, illo quas fugit, beatae 
      neque minus consequuntur modi. Placeat, velit. Quidem 
      blanditiis nemo labore magni suscipit. Quibusdam, fuga.
    </div>
  </div>
</body>
</html>
